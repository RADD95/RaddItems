sets:

  guardian_set:
    pieces:
      - sample_guardian_helmet
      - sample_guardian_chestplate
      - sample_guardian_leggings
      - sample_guardian_boots
    required_amount: 4
    attributes:
      - attribute: GENERIC_MAX_HEALTH
        amount: 4.0
        operation: ADD_NUMBER
        slot: ANY
      - attribute: GENERIC_KNOCKBACK_RESISTANCE
        amount: 0.10
        operation: ADD_NUMBER
        slot: ANY
      - attribute: GENERIC_SCALE
        amount: -0.8
        operation: ADD_SCALAR
        slot: ANY
    potion_effects:
      - type: NIGHT_VISION
        amplifier: 0
        ambient: true
        particles: false
        icon: true
      - type: HASTE
        amplifier: 0
        ambient: true
        particles: false
        icon: true
    triggers:
      on_activate:
        enabled: true
        potion_effects_self:
          - type: ABSORPTION
            duration: 100
            amplifier: 0
            ambient: false
            particles: true
            icon: true
        commands:
          - 'tellraw %player% {"text":"Guardian Set activated: %set_id%","color":"aqua"}'
      on_deactivate:
        enabled: true
        potion_effects_self: []
        commands:
          - 'tellraw %player% {"text":"Guardian Set deactivated: %set_id%","color":"gray"}'

  mixed_slots_set:
